<!DOCTYPE html>
<html>
<head>
  <title>Minimal Part-Blocks Test</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    .part-block {
      background: #333; color: white; padding: 1rem; margin: 2rem 0;
      cursor: pointer; position: relative;
    }
    .part-chevron { position: absolute; right: 1rem; }
    .content { background: #f0f0f0; padding: 1rem; margin: 0.5rem 0; }
    .part-group { border: 1px solid #ccc; }
    .part-group.part-collapsed { display: none; }
    #log {
      background: #fff8dc; border: 1px solid #ccc; padding: 1rem; margin-top: 2rem;
      font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Minimal Part-Blocks Test</h1>

  <div class="part-block">Part 1: Click Me ▼</div>
  <div class="content">Content 1A</div>
  <div class="content">Content 1B</div>

  <div class="part-block">Part 2: Click Me ▼</div>
  <div class="content">Content 2A</div>
  <div class="content">Content 2B</div>

  <div id="log">Console output...</div>

  <script>
    const log = document.getElementById('log');
    const lines = [];

    function addLog(msg) {
      lines.push(msg);
      log.textContent = lines.join('\n');
    }

    document.addEventListener('DOMContentLoaded', () => {
      addLog('DOMContentLoaded fired');

      // Minimal version of the part-blocks code
      (function () {
        const blocks = document.querySelectorAll('.part-block');
        addLog(`Found ${blocks.length} part-block elements`);

        blocks.forEach((block, idx) => {
          addLog(`Processing block ${idx}: ${block.textContent.substring(0, 20)}`);

          // Create part-group
          const group = document.createElement('div');
          group.className = 'part-group';

          // Collect siblings
          const siblings = [];
          let el = block.nextElementSibling;
          while (el && !el.classList.contains('part-block')) {
            siblings.push(el);
            el = el.nextElementSibling;
          }
          addLog(`  Collected ${siblings.length} siblings`);

          // Insert group and move siblings
          block.insertAdjacentElement('afterend', group);
          siblings.forEach(s => group.appendChild(s));

          // Add click handler
          block.addEventListener('click', () => {
            group.classList.toggle('part-collapsed');
            addLog(`  Toggle clicked! Collapsed: ${group.classList.contains('part-collapsed')}`);
          });
        });
      })();
    });
  </script>
</body>
</html>
